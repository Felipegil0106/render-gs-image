name: Construir imagen Render-GS (2DGS)

# Manual: solo se construye cuando aprietas "Run workflow" en GitHub.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── Paso 1: liberar espacio (la imagen CUDA+PyTorch+2DGS es grande) ──
      # El runner trae ~14GB; liberamos a ~50GB+ borrando SDKs que no usamos.
      - name: Liberar espacio en disco (agresivo)
        run: |
          echo "Espacio antes:"; df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /opt/microsoft || true
          sudo rm -rf /usr/lib/google-cloud-sdk || true
          sudo rm -rf /usr/local/lib/node_modules || true
          sudo apt-get clean || true
          sudo docker image prune --all --force || true
          echo "Espacio después:"; df -h /

      # ── Paso 2: bajar el repo (con el Dockerfile) ──
      - name: Bajar el código
        uses: actions/checkout@v4

      # ── Paso 3: login en Docker Hub ANTES del builder (evita límite anónimo) ──
      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Paso 4: preparar buildx ──
      - name: Configurar Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      # ── Paso 5: construir y subir (con reintentos por timeouts de red) ──
      - name: Construir y subir la imagen (con reintentos)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            docker buildx build \
              --builder ${{ steps.buildx.outputs.name }} \
              --file ./Dockerfile \
              --tag ${{ secrets.DOCKERHUB_USERNAME }}/render-gs:v1 \
              --push \
              .
